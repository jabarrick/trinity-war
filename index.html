function aL(m){S.log=S.log.slice(-80);S.log.push(m)}
var AZ=function(p){var r=[];ZCATS.forEach(function(c){p[c].forEach(function(x){r.push(x)})});return r};

function mkP(f,hu,i){var d=shuf(D[f]);
  // Ensure starting hand has at least 1 attack card
  var hand=[],deck=d.slice();
  for(var j=0;j<deck.length&&hand.length<SH;j++){if(deck[j].cat==="A"){hand.push(deck[j]);deck.splice(j,1);j--}}
  while(hand.length<SH&&deck.length>0)hand.push(deck.shift());
  return{id:i,f:f,hu:hu,hp:HP,faith:SF,inf:0,shield:0,armor:0,armorT:0,burn:0,burnT:0,inspired:0,locked:0,deck:deck,hand:hand,dis:[],alive:1,E:[],G:[],C:[],O:[],K:[]}}
function drawC(p,n){for(var i=0;i<n;i++){if(!p.deck.length&&p.dis.length){p.deck=shuf(p.dis);p.dis=[]}if(p.deck.length)p.hand.push(p.deck.shift())}}
function drawAttack(p){
  var a=p.dis.filter(function(c){return c.cat==="A"}).sort(function(a,b){return(b.atk||0)-(a.atk||0)});
  if(a.length){var c=a[0];p.dis=p.dis.filter(function(x){return x.id!==c.id});p.hand.push(c);return c}
  for(var i=0;i<p.deck.length;i++){if(p.deck[i].cat==="A"){var c=p.deck.splice(i,1)[0];p.hand.push(c);return c}}
  return null}

function doTS(p){
  if(p.burn>0&&p.burnT>0){p.hp=r1(Math.max(0,p.hp-p.burn));p.burnT--;if(!p.burnT)p.burn=0}
  if(p.armorT>0){p.armorT--;if(!p.armorT)p.armor=0}
  p.locked=0;p.inspired=0;
  // Faith: base + 经典(K) bonus (Christianity: no cap)
  var fGain=FT+getZoneVal(p,"fg");
  p.faith=r1(p.f==="christianity"?p.faith+fGain:Math.min(MXF,p.faith+fGain));
  // Influence: only from 组织 zone
  p.inf=r1(Math.min(20,p.inf+getZoneVal(p,"ig")));
  // NO passive healing
  drawC(p,1)}

function doAtk(ps,ai,di,card,free){
  var a=ps[ai],d=ps[di],af=F[a.f],df=F[d.f],hA=af.beats===d.f,hD=df.beats===a.f;
  var cr=0,rc=free?0:card.cost;
  a.faith=r1(Math.max(0,a.faith-rc));
  var dm=card.atk+a.inspired+getZoneVal(a,"atk");
  var amp=gInfAmp(a);if(amp>0)dm=r1(dm*(1+amp));
  if(hA)dm=r1(dm*AD);if(hD)dm=r1(dm*DD);
  // Defense: 经典 dr + influence dr
  var drd=getZoneVal(d,"dr")+gInfDR(d);
  if(drd>0)dm=r1(Math.max(0,dm-drd));
  if(d.armor>0)dm=r1(Math.max(0,dm-d.armor));
  var bl=0;if(d.shield>0&&card.fx!=="pierce"){bl=r1(Math.min(d.shield,dm));dm=r1(dm-bl);d.shield=r1(d.shield-bl)}
  dm=r1(Math.max(0,dm));d.hp=r1(Math.max(0,d.hp-dm));
  var ah=0;if(hA&&dm>0){ah=r1(dm*AHP);a.hp=r1(Math.min(HP,a.hp+ah));a.faith=r1(a.f==="christianity"?a.faith+AFB:Math.min(MXF,a.faith+AFB))}
  a.inf=r1(Math.min(20,a.inf+dm/3+0.5));
  a.hand=a.hand.filter(function(c){return c.id!==card.id});a.dis.push(card);
  var ex=[],ch=0,e=card.fx,v=card.fv;
  if(e==="heal"){a.hp=r1(Math.min(HP,a.hp+v));ex.push("💚+"+v)}
  if(e==="shield"){a.shield=r1(a.shield+v);ex.push("🛡+"+v)}
  if(e==="faith"){a.faith=r1(a.f==="christianity"?a.faith+v:Math.min(MXF,a.faith+v));ex.push("🔮+"+v)}
  if(e==="draw"){drawC(a,Math.min(Math.floor(v),3));ex.push("📜+"+Math.min(Math.floor(v),3))}
  if(e==="revive"&&a.dis.length>0){var b=a.dis.filter(function(c){return c.cat==="A"}).sort(function(x,y){return(y.atk||0)-(x.atk||0)})[0];if(b){a.dis=a.dis.filter(function(c){return c.id!==b.id});a.hand.push(b);ex.push("♻"+b.nm)}}
  if(e==="discard"&&d.hand.length>0){var ri=0|Math.random()*d.hand.length;var rm=d.hand.splice(ri,1)[0];d.dis.push(rm);ex.push("🗑"+rm.nm)}
  if(e==="steal"){var s=r1(Math.min(v,d.hp));d.hp=r1(d.hp-s);a.hp=r1(Math.min(HP,a.hp+s));ex.push("💰"+s)}
  if(e==="destroy"&&d.hand.length>0){var w=d.hand.slice().sort(function(x,y){return(x.cost||0)-(y.cost||0)})[0];d.hand=d.hand.filter(function(c){return c.id!==w.id});d.dis.push(w);ex.push("🔥"+w.nm)}
  if(e==="aoe"){ps.forEach(function(p){if(p.id!==a.id&&p.alive&&p.id!==d.id){p.hp=r1(Math.max(0,p.hp-v));ex.push("💥"+F[p.f].icon+"-"+v)}})}
  if(e==="reflect"){var rf=r1(dm*0.3);if(rf>0){a.hp=r1(Math.max(0,a.hp-rf));ex.push("🔄"+rf)}}
  if(e==="lock")d.locked=1;
  if(e==="nullify"){if(d.shield>0)d.shield=0;if(d.armor>0){d.armor=0;d.armorT=0}}
  if(e==="chain"){ch=1;ex.push("⚡连锁")}
  if(e==="burn"){d.burn=r1(v);d.burnT=2;ex.push("🔥"+v+"×2")}
  if(e==="armor"){a.armor=r1(v);a.armorT=3}
  if(e==="inspire"){a.inspired=r1(a.inspired+v);ex.push("📯+"+v)}
  if(e==="purify"){a.burn=0;a.burnT=0;a.locked=0;ex.push("✨")}
  if(ah>0)ex.push("☯+"+ah+"血");
  ps.forEach(function(p){if(p.hp<=0)p.alive=0});
  var msg=af.icon+"【"+card.nm+"】💎"+(free?"0":rc);
  if(hA)msg+="[克]";if(hD)msg+="[弱]";msg+="→"+df.icon+dm+"伤";
  return{msg:msg,ex:ex,ch:ch}}

function dep(ps,pi,card){var p=ps[pi];p.faith=r1(Math.max(0,p.faith-card.cost));p.hand=p.hand.filter(function(c){return c.id!==card.id});p[card.cat].push(card)}

function doUlt(ps,i){var p=ps[i];p.inf=r1(p.inf-UC);var ex=[];
  if(p.f==="buddhism"){
    p.hp=HP;p.burn=0;p.burnT=0;p.locked=0;
    p.shield=r1(p.shield+7);
    ex.push("☸涅槃 回满血 净化 +7盾")}
  if(p.f==="communism"){
    ps.forEach(function(q){if(q.id!==p.id&&q.alive){
      q.hp=r1(Math.max(0,q.hp-2));
      ZCATS.forEach(function(cat){q[cat].forEach(function(c){q.dis.push(c)});q[cat]=[]});
      if(q.hp<=0)q.alive=0}});
    ex.push("☭批斗 全敌-2 拆光功能牌")}
  if(p.f==="christianity"){
    var rv=p.dis.filter(function(c){return c.cat==="A"}).sort(function(a,b){return(b.atk||0)-(a.atk||0)}).slice(0,3);
    rv.forEach(function(c){p.dis=p.dis.filter(function(x){return x.id!==c.id});p.hand.push(c)});
    ps.forEach(function(q){if(q.id!==p.id&&q.alive){q.burn=2;q.burnT=3}});
    p.faith=r1(p.faith+6);
    ex.push("✝审判 复活"+rv.length+"牌 全敌灼2×3 +6仰(无上限)")}
  return ex}

function aiTurn(ps,idx){
  var ai=ps[idx],af=F[ai.f];var logs=["── "+af.icon+af.nm+" ──"];
  doTS(ai);
  while(ai.hand.length>MH){var w=ai.hand.slice().sort(function(a,b){return(a.cost||0)-(b.cost||0)})[0];ai.hand=ai.hand.filter(function(x){return x.id!==w.id});ai.dis.push(w)}
  // === SMART DEPLOY: build candidate list, sort by tier desc + cost asc, greedy ===
  var moves=[];
  ZCATS.forEach(function(cat){
    ai.hand.forEach(function(c){
      if(c.cat!==cat)return;
      var cur=ai[cat][0];
      if(!cur)moves.push({cat:cat,card:c,type:'D',tier:c.tier||0,cost:c.cost});
      else if((c.tier||0)>(cur.tier||0))moves.push({cat:cat,card:c,type:'U',tier:c.tier||0,cost:c.cost});
    });
  });
  moves.sort(function(a,b){return(b.tier-a.tier)||(a.cost-b.cost)});
  moves.forEach(function(m){
    if(m.cost>ai.faith)return;
    if(!ai.hand.some(function(c){return c.id===m.card.id}))return;
    if(m.type==='D'){if(ai[m.cat].length>0)return;dep(ps,idx,m.card);logs.push("  "+CN[m.cat]+"【"+m.card.nm+"】")}
    else{var cur=ai[m.cat][0];if(!cur||(m.card.tier||0)<=(cur.tier||0))return;
      ai[m.cat]=[];ai.dis.push(cur);dep(ps,idx,m.card);logs.push("  ⬆"+CN[m.cat]+"【"+cur.nm+"→"+m.card.nm+"】")}
  });
  // === SMART TRADE: trade leftover function cards (non-deployable, lower tier) ===
  var fnHand=ai.hand.filter(function(x){return x.cat!=="A"&&(ai[x.cat].length>0&&(x.tier||0)<=(ai[x.cat][0].tier||0))});
  var tr=getTradeRate(ai);
  while(fnHand.length>=tr&&ai.inf>=TRADE_COST){
    for(var i=0;i<tr;i++){var c=fnHand.shift();ai.hand=ai.hand.filter(function(x){return x.id!==c.id});ai.dis.push(c)}
    ai.inf=r1(ai.inf-TRADE_COST);var got=drawAttack(ai);
    if(got)logs.push("  🔄换牌×"+tr+"→"+got.nm);
    fnHand=ai.hand.filter(function(x){return x.cat!=="A"&&(ai[x.cat].length>0&&(x.tier||0)<=(ai[x.cat][0].tier||0))})}
  if(ai.inf>=UC){doUlt(ps,idx).forEach(function(e){logs.push("  "+e)})}
  var free=0,pl=0;
  while(pl<3){if(!ai.alive)break;var ts=ps.filter(function(p){return p.alive&&p.id!==ai.id});if(!ts.length)break;
    var af2=ai.hand.filter(function(x){return x.cat==="A"&&(free||x.cost<=ai.faith)});if(!af2.length)break;
    var best2=ts[0];ts.forEach(function(t){if(F[ai.f].beats===t.f)best2=t});
    var so=af2.sort(function(a,b){return b.atk-a.atk});var pk=so[0];
    var di=ps.indexOf(best2);var r=doAtk(ps,idx,di,pk,free);
    logs.push("  "+r.msg);r.ex.forEach(function(e){logs.push("    "+e)});
    free=r.ch;pl++;if(!r.ch&&ai.faith<1)break}
  return logs}

function checkEnd(){var al=S.ps.filter(function(p){return p.alive});if(al.length<=1){S.win=al[0]||null;S.ph="gameover";aL(S.win?"🏆"+F[S.win.f].nm+"获胜！":"☯");S.busy=0;render();return 1}return 0}
function advance(from){if(checkEnd())return;var nx=(from+1)%3,sf=0;while(!S.ps[nx].alive&&sf<3){nx=(nx+1)%3;sf++}S.tn=nx;if(nx===0)S.rd++;if(S.ps[nx].hu){doTS(S.ps[nx]);S.ph="play";S.sel=null;S.tgt=null;S.busy=0;S.frN=0;S.atked=0;S.tradeCnt=0;var nd=S.ps[0].hand.length-MH;if(nd>0){S.dsc=nd;aL("── R"+S.rd+" ── ⚠弃"+nd+"张")}else{S.dsc=0;aL("── R"+S.rd+" ──")}render()}else{S.busy=1;render();var d1=S.spec?700:250,d2=S.spec?900:300;setTimeout(function(){var logs=aiTurn(S.ps,nx);logs.forEach(aL);setTimeout(function(){advance(nx)},d2)},d1)}}

window.sc=function(cid){if(S.busy)return;var me=S.ps[0];if(S.dsc>0){var c;me.hand.forEach(function(x){if(x.id===cid)c=x});if(c){me.hand=me.hand.filter(function(x){return x.id!==cid});me.dis.push(c);S.dsc--;aL("🗑弃「"+c.nm+"」"+(S.dsc>0?" 还需"+S.dsc+"张":""));if(S.dsc<=0)aL("✅弃牌完成")}render();return}var c;me.hand.forEach(function(x){if(x.id===cid)c=x});S.sel=(S.sel&&S.sel.id===cid)?null:c;S.zpop="";render()};

window.tradeCard=function(){if(!S.sel||S.busy||S.dsc>0||S.sel.cat==="A")return;
  var me=S.ps[0],c=S.sel;
  me.hand=me.hand.filter(function(x){return x.id!==c.id});me.dis.push(c);
  S.tradeCnt++;S.sel=null;
  var need=getTradeRate(me);
  if(S.tradeCnt>=need){
    if(me.inf<TRADE_COST){aL("❌影响不足(需⭐"+TRADE_COST+") 换牌失败 已投入的牌已弃");S.tradeCnt=0;render();return}
    me.inf=r1(me.inf-TRADE_COST);S.tradeCnt=0;
    var got=drawAttack(me);aL("🔄换牌完成 -⭐"+TRADE_COST+" →"+(got?"【"+got.nm+"】":"无攻击牌可抽"));
  }else{aL("🔄投入「"+c.nm+"」("+S.tradeCnt+"/"+need+") 再投"+(need-S.tradeCnt)+"张")}
  render()};

window.pc=function(){if(!S.sel||S.busy||S.dsc>0)return;var me=S.ps[0];
  if(S.sel.cat==="A"){if(S.tgt===null)return;var co=S.frN?0:S.sel.cost;if(co>me.faith){aL("❌信仰不足");render();return}

    S.sel=null;S.frN=r.ch;S.tgt=null;S.atked=1;if(checkEnd())return;

      if(S.sel.tier&&old.tier&&S.sel.tier>old.tier){if(S.sel.cost>me.faith){aL("❌信仰不足");render();return}
        me[cat]=[];me.dis.push(old);aL("⬆"+CN[cat]+"【"+old.nm+"→"+S.sel.nm+"】");dep(S.ps,0,S.sel);S.sel=null;render();return;
      }else{aL("❌低档无法替换 可换牌或丢弃");render();return}}

    aL(CN[cat]+"【"+S.sel.nm+"】部署");dep(S.ps,0,S.sel);S.sel=null}render()};

  return'<div style="display:flex;gap:3px;flex-wrap:wrap;font-size:'+z+'px"><span style="color:#f66">❤'+r1(p.hp)+'</span><span style="color:#a78bfa">🔮'+r1(p.faith)+'</span><span style="color:#fbbf24">⭐'+r1(p.inf)+'/'+UC+(it.length?' <span style="opacity:.6">('+it.join(' ')+')</span>':'')+'</span>'+(p.shield>0?'<span style="color:#4af">🛡'+r1(p.shield)+'</span>':'')+(p.burn>0?'<span style="color:#ef4444">🔥'+r1(p.burn)+'</span>':'')+'</div>'}

function rSpec(){
